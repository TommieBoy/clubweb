<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manage Calendar Events - KARC</title>
  <style>
    :root {
      --accent: #c2410c;
      --accent-2: #0f766e;
      --ink: #1f1a14;
      --ink-soft: #5f5448;
      --line: #d6c8ae;
      --bg: #f4efe2;
      --card: #f9f3e5;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      margin: 0.5rem 0;
      color: var(--ink);
    }

    header a {
      color: var(--accent);
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    .form-section {
      background: #fffaf0;
      padding: 1.5rem;
      border-radius: 6px;
      margin-bottom: 2rem;
      border: 1px solid var(--line);
    }

    .form-section h2 {
      margin-top: 0;
      color: var(--ink);
      font-size: 1.25rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.25rem;
      color: var(--ink-soft);
      font-size: 0.9rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      background: #fffef5;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .button-group {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #a33005;
    }

    .btn-secondary {
      background: var(--accent-2);
      color: white;
    }

    .btn-secondary:hover {
      background: #0d5a57;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-link {
      background: transparent;
      color: var(--accent);
      text-decoration: none;
      padding: 0;
      text-align: left;
    }

    .btn-link:hover {
      text-decoration: underline;
    }

    .events-list {
      background: #fffaf0;
      padding: 1.5rem;
      border-radius: 6px;
      border: 1px solid var(--line);
    }

    .events-list h2 {
      margin-top: 0;
      color: var(--ink);
      font-size: 1.25rem;
    }

    .event-item {
      background: white;
      padding: 1rem;
      border-left: 4px solid var(--accent);
      margin-bottom: 1rem;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 1rem;
    }

    .event-info h3 {
      margin: 0 0 0.25rem 0;
      color: var(--ink);
    }

    .event-info p {
      margin: 0.25rem 0;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .event-actions {
      display: flex;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .event-actions button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }

    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      border: 1px solid #a7f3d0;
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      border: 1px solid #fecaca;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--ink-soft);
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .event-item {
        flex-direction: column;
      }

      .event-actions {
        width: 100%;
      }

      .event-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <header>
      <h1>📅 Manage Calendar Events</h1>
      <p>Add, edit, or remove club meetings and events. Changes appear on the <a href="/">homepage</a> immediately.</p>
    </header>

    <div id="message" style="display: none;"></div>

    <div class="form-section">
      <h2>Add New Event</h2>
      <form id="eventForm">
        <div class="form-row">
          <div class="form-group">
            <label for="title">Event Title *</label>
            <input type="text" id="title" required placeholder="e.g., General Meeting">
          </div>
          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" required>
              <option value="meeting">Club Meeting</option>
              <option value="event">Club Event</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label for="time">Time *</label>
            <input type="time" id="time" required value="19:00">
          </div>
        </div>

        <div class="form-group">
          <label for="location">Location *</label>
          <input type="text" id="location" required placeholder="e.g., Kirsten's Hideout">
        </div>

        <div class="form-group">
          <label for="description">Event Description *</label>
          <textarea id="description" required placeholder="Describe the event details..."></textarea>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-primary">Add Event</button>
          <button type="reset" class="btn-secondary">Clear</button>
        </div>
      </form>
    </div>

    <div class="events-list">
      <h2>Current Events</h2>
      <div id="eventsList"></div>
    </div>
  </div>

  <script>
    // Load events
    let events = [];

    async function loadEvents() {
      try {
        const response = await fetch('/prototype/events.json');
        events = await response.json();
        renderEventsList();
      } catch (error) {
        showMessage('Error loading events: ' + error.message, 'error');
      }
    }

    function renderEventsList() {
      const list = document.getElementById('eventsList');
      if (events.length === 0) {
        list.innerHTML = '<div class="empty-state">No events yet. Add your first event above!</div>';
        return;
      }

      // Sort events by date
      events.sort((a, b) => new Date(a.date) - new Date(b.date));

      list.innerHTML = events.map(event => `
        <div class="event-item">
          <div class="event-info">
            <h3>${event.title}</h3>
            <p><strong>${new Date(event.date).toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
              year: 'numeric'
            })} at ${event.time}</strong></p>
            <p>📍 ${event.location}</p>
            <p>${event.description}</p>
          </div>
          <div class="event-actions">
            <button class="btn-secondary" onclick="editEvent(${event.id})">Edit</button>
            <button class="btn-danger" onclick="deleteEvent(${event.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function generateId() {
      return events.length > 0 ? Math.max(...events.map(e => e.id)) + 1 : 1;
    }

    async function saveEvents() {
      try {
        const response = await fetch('/admin/save-events.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(events)
        });
        if (!response.ok) throw new Error('Failed to save');
        return true;
      } catch (error) {
        showMessage('Error saving events: ' + error.message, 'error');
        return false;
      }
    }

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newEvent = {
        id: generateId(),
        title: document.getElementById('title').value,
        date: document.getElementById('date').value,
        time: document.getElementById('time').value,
        location: document.getElementById('location').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value
      };

      events.push(newEvent);
      
      if (await saveEvents()) {
        showMessage('Event added successfully!', 'success');
        document.getElementById('eventForm').reset();
        renderEventsList();
      }
    });

    async function deleteEvent(id) {
      if (!confirm('Are you sure you want to delete this event?')) return;
      
      events = events.filter(e => e.id !== id);
      if (await saveEvents()) {
        showMessage('Event deleted successfully!', 'success');
        renderEventsList();
      }
    }

    function editEvent(id) {
      const event = events.find(e => e.id === id);
      if (!event) return;

      document.getElementById('title').value = event.title;
      document.getElementById('date').value = event.date;
      document.getElementById('time').value = event.time;
      document.getElementById('location').value = event.location;
      document.getElementById('description').value = event.description;
      document.getElementById('category').value = event.category;

      // Change form to edit mode
      const btn = document.querySelector('button[type="submit"]');
      btn.textContent = 'Update Event';
      
      const form = document.getElementById('eventForm');
      const originalSubmit = form.onsubmit;
      
      form.onsubmit = async (e) => {
        e.preventDefault();
        event.title = document.getElementById('title').value;
        event.date = document.getElementById('date').value;
        event.time = document.getElementById('time').value;
        event.location = document.getElementById('location').value;
        event.description = document.getElementById('description').value;
        event.category = document.getElementById('category').value;

        if (await saveEvents()) {
          showMessage('Event updated successfully!', 'success');
          form.onsubmit = originalSubmit;
          btn.textContent = 'Add Event';
          form.reset();
          renderEventsList();
        }
      };
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showMessage(msg, type) {
      const div = document.getElementById('message');
      div.textContent = msg;
      div.className = type === 'error' ? 'error-message' : 'success-message';
      div.style.display = 'block';
      setTimeout(() => { div.style.display = 'none'; }, 3000);
    }

    // Initialize
    loadEvents();
  </script>
</body>
</html>
